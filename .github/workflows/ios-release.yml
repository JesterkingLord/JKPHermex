# iOS release pipeline.
#
# Triggered by pushing a tag matching `vMAJOR.MINOR.PATCH[-PRERELEASE]`
# (e.g. `v1.5.0`, `v2.0.0-rc1`). Builds the iOS app, exports an .ipa
# for App Store Connect / TestFlight, and attaches it to a GitHub
# Release named after the tag.
#
# This is the iOS sibling of `android-release.yml`. The two workflows
# share tag-name convention but run on independent runners (`ubuntu-latest`
# vs `macos-latest`) so neither blocks the other.
#
# Important constraints from `ios/AGENTS.md`:
#  - CODE_SIGNING_ALLOWED must NOT be NO on a real build — that strips
#    entitlements and breaks Keychain writes. The workflow therefore
#    imports a signing certificate + provisioning profile from secrets.
#  - `CURRENT_PROJECT_VERSION` is bumped per upload (TestFlight
#    requirement), but `MARKETING_VERSION` stays at the tag's
#    `MAJOR.MINOR.PATCH`. `xcconfig` overrides below inject the tag
#    version into `MARKETING_VERSION` at build time.
#
# Usage:
#   1. Bump `MARKETING_VERSION` in `ios/HermesMobile.xcodeproj/project.pbxproj`.
#   2. Update CHANGELOG.md.
#   3. Commit the bump on the default branch.
#   4. Tag from main:        git tag -a v1.5.0 -m "v1.5.0"
#   5. Push the tag:         git push origin v1.5.0
#   6. The workflow runs; the .ipa appears under the new GitHub Release.
#
# The app's in-app update checker will not find this release until the
# tag is published — same caveat as the Android workflow.
name: iOS Release

on:
  push:
    tags:
      # e.g. v1.5.0, v2.0.0-rc1
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

concurrency:
  group: ios-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build iOS .ipa and publish GitHub Release
    runs-on: macos-14
    timeout-minutes: 45
    env:
      # Sourced from repo secrets (configure via the GitHub web UI):
      #   IOS_DEVELOPER_TEAM_ID          — Apple Developer Team ID (10 chars)
      #   IOS_CODE_SIGNING_CERT_P12      — base64-encoded .p12 of the
      #                                     "iPhone Distribution" cert + key
      #   IOS_CODE_SIGNING_CERT_PASSWORD — password for the .p12
      #   IOS_PROVISIONING_PROFILE       — base64-encoded .mobileprovision
      #   KEYCHAIN_PASSWORD              — arbitrary password for the
      #                                     ephemeral keychain we create
      MARKETING_VERSION: ${{ github.ref_name }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Decode signing secrets
        env:
          IOS_CODE_SIGNING_CERT_P12: ${{ secrets.IOS_CODE_SIGNING_CERT_P12 }}
          IOS_CODE_SIGNING_CERT_PASSWORD: ${{ secrets.IOS_CODE_SIGNING_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p build/signing
          echo "$IOS_CODE_SIGNING_CERT_P12" | base64 --decode > build/signing/cert.p12
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > build/signing/profile.mobileprovision

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import build/signing/cert.p12 \
              -P "$IOS_CODE_SIGNING_CERT_PASSWORD" \
              -A -t cert -f pkcs12 \
              -k build.keychain
          security list-keychain -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Decode profile UUID + check it matches our bundle IDs
          /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i build/signing/profile.mobileprovision)"

      - name: Write release xcconfig
        run: |
          set -euo pipefail
          cat > ios/Config/Release.xcconfig <<EOF
          MARKETING_VERSION = ${MARKING_VERSION}
          CURRENT_PROJECT_VERSION = $(date +%s)
          DEVELOPMENT_TEAM = ${{ secrets.IOS_DEVELOPER_TEAM_ID }}
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY = "iPhone Distribution"
          PROVISIONING_PROFILE_SPECIFIER = "${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}"
          EOF

      - name: Build iOS .ipa
        working-directory: ios
        run: |
          set -euo pipefail
          xcodebuild \
              -project HermesMobile.xcodeproj \
              -scheme HermesMobile \
              -configuration Release \
              -destination "generic/platform=iOS" \
              -archivePath build/HermesMobile.xcarchive \
              archive \
              CODE_SIGNING_ALLOWED=YES
          xcodebuild \
              -exportArchive \
              -archivePath build/HermesMobile.xcarchive \
              -exportPath build \
              -exportOptionsPlist ExportOptions.plist
          ls -la build/*.ipa

      - name: Rename .ipa to include version
        id: rename
        run: |
          set -euo pipefail
          src="$(find ios/build -name '*.ipa' -type f | head -n1)"
          if [ -z "$src" ]; then
            echo "No .ipa produced — failing."
            exit 1
          fi
          new_name="JKPMobile-${GITHUB_REF_NAME}.ipa"
          cp "$src" "$new_name"
          echo "artifact_name=$new_name" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and attach .ipa
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.rename.outputs.artifact_name }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}