# Android release pipeline.
#
# Triggered by pushing a tag that matches `vMAJOR.MINOR.PATCH[-PRERELEASE]`
# (e.g. `v0.2.0`, `v1.0.0-rc1`). Builds the debug APK, attaches it to a
# GitHub Release with the same name as the tag, and surfaces the URL the
# app's in-app update checker will poll.
#
# This is the "stable (GitHub releases)" channel that the app's Settings
# screen advertises in its "Update channel" row. Releases are signed with
# the debug keystore — fine for sideloading to your own devices, NOT for
# the Play Store. Add a signing config + Play upload step before any
# Play submission (Android port plan §6).
#
# Usage:
#   1. Bump `versionCode` and `versionName` in `android/app/build.gradle.kts`.
#   2. Update CHANGELOG.md.
#   3. Commit the bump on the default branch.
#   4. Tag from main:        git tag -a v0.2.0 -m "v0.2.0"
#   5. Push the tag:         git push origin v0.2.0
#   6. The workflow runs; the APK appears under the new GitHub Release.
#
# The app fetches `https://api.github.com/repos/JesterkingLord/JKPHermex/releases/latest`
# to discover new versions — the tag name there MUST match a release on
# this repo or the in-app update check will report "up to date".
name: Android Release

on:
  push:
    tags:
      # e.g. v0.2.0, v1.0.0-rc1, v10.20.30
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build debug APK and publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@v7
        with:
          # Tags must be fetched explicitly when checking out by ref.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Locate APK
        id: locate
        working-directory: android
        run: |
          set -euo pipefail
          apk=$(find app/build/outputs/apk/debug -name '*.apk' -type f | head -n1)
          if [ -z "$apk" ]; then
            echo "No APK produced — failing."
            exit 1
          fi
          echo "apk_path=$apk" >> "$GITHUB_OUTPUT"
          echo "Built APK: $apk"

      - name: Rename APK to include version
        id: rename
        run: |
          set -euo pipefail
          src="${{ steps.locate.outputs.apk_path }}"
          # e.g. app-debug.apk -> JKPHermex-v0.2.0-debug.apk
          new_name="JKPHermex-${GITHUB_REF_NAME}-debug.apk"
          cp "android/$src" "$new_name"
          echo "artifact_name=$new_name" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and attach APK
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.rename.outputs.artifact_name }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}